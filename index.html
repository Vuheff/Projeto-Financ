
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceHub - Dashboard</title>
    <link rel="stylesheet" href="/src/style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <!-- Logo -->
        <div class="sidebar__header"> 
            <div class="sidebar__logo-icon">
                <span class="material-icons" style="color: white;">account_balance_wallet</span>
            </div>
            <div class="sidebar__logo-text">
                <h1 class="sidebar__title">FinanceHub</h1>
                <p class="sidebar__subtitle">Gestão Inteligente</p>
            </div>
        </div>

        <!-- User -->
        <div class="sidebar__user">
            <div class="user__avatar">J</div>
            <div class="user__info">
                <p class="user__name">João Silva</p>
                <p class="user__email">joao@exemplo.com</p>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar__nav">
            <p class="nav__title">Menu</p>
            <div class="nav__item active" data-page="dashboard">
                <span class="material-icons">dashboard</span>
                Dashboard
            </div>
            <div class="nav__item" data-page="transacoes">
                <span class="material-icons">wallet</span>
                Transações
            </div>
            <div class="nav__item" data-page="contas">
                <span class="material-icons">account_balance</span>
                Contas
            </div>
            <div class="nav__item" data-page="metas">
                <span class="material-icons">add_task</span>
                Metas
            </div>
            <div class="nav__item" data-page="relatorios">
                <span class="material-icons">bar_chart</span>
                Relatórios
            </div>
            <div class="nav__item" data-page="configuracoes">
                <span class="material-icons">settings</span>
                Configurações
            </div>
        </nav>

        <!-- Logout -->
        <div class="sidebar__footer">
            <button class="logout__button">
                <span class="material-icons">exit_to_app</span>
                Sair da conta
            </button>
        </div>
    </aside>

    <main class="pagina-central">
        <!-- O conteúdo dinâmico (incluindo o cabeçalho de cada aba) será carregado aqui -->
        <div id="content-area"></div>
    </main>

    <script src="/src/javascript/script.js"></script>
</body>
</html>
