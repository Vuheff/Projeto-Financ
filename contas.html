
<div class="contas-container">
    <div class="contas-header">
        <div class="texto-superior">
            <p>Gerencie suas contas financeiras</p>
            <h1>Minhas Contas</h1>
        </div>
        <div class="contas-actions">
            <button class="btn-exportar">Ocultar</button>
            <button class="botão-transação">Nova Conta</button>
        </div>
    </div>

    <!-- Card de Patrimônio Total (Específico de Contas) -->
    <div class="card-patrimonio card-patrimonio--contas">
        <div class="patrimonio-header">
            <span>Patrimônio Total</span>
        </div>
        <div class="patrimonio-valor">R$ 42.455,00</div>
        <div class="patrimonio-footer">
            <p>3 contas ativas</p>
        </div>
    </div>

    <!-- Grid de Contas -->
    <div class="grid-cards">
        <!-- Conta Corrente -->
        <div class="card-secundario">
            <div class="card-secundario__header">
                <div class="card-secundario__icon icon-corrente">
                    <span class="material-icons">account_balance_wallet</span>
                </div>
            </div>
            <div class="card-secundario__label">Conta Corrente</div>
            <div class="card-secundario__valor">R$ 4.255,00</div>
            <div class="card-footer-info">
                <div class="footer-label">
                    <span class="material-icons" style="font-size: 12px;">account_balance</span>
                    Corrente
                </div>
                <div class="status-dot dot-blue"></div>
            </div>
        </div>

        <!-- Poupança -->
        <div class="card-secundario">
            <div class="card-secundario__header">
                <div class="card-secundario__icon icon-poupanca">
                    <span class="material-icons">savings</span>
                </div>
            </div>
            <div class="card-secundario__label">Poupança</div>
            <div class="card-secundario__valor">R$ 12.800,00</div>
            <div class="card-footer-info">
                <div class="footer-label">
                    <span class="material-icons" style="font-size: 12px;">account_balance</span>
                    Poupança
                </div>
                <div class="status-dot dot-green"></div>
            </div>
        </div>

        <!-- Investimentos -->
        <div class="card-secundario">
            <div class="card-secundario__header">
                <div class="card-secundario__icon icon-invest">
                    <span class="material-icons">trending_up</span>
                </div>
            </div>
            <div class="card-secundario__label">Investimentos</div>
            <div class="card-secundario__valor">R$ 25.400,00</div>
            <div class="card-footer-info">
                <div class="footer-label">
                    <span class="material-icons" style="font-size: 12px;">account_balance</span>
                    Investimentos
                </div>
                <div class="status-dot dot-purple"></div>
            </div>
        </div>
    </div>
</div>
