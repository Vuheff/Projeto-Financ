<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Google Icons -->
     <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <!-- Favicon -->
    <link rel="shortcut icon" href="favicon/icon-aba.svg" type="image/svg+xml">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/pagina-principal.css">
</head>

<body>
    <aside class="sidebar">

        <!-- Logo -->
        <div class="sidebar__header"> 
            <img src="favicon/icon-site.svg" class="sidebar__logo-icon" alt="">

            <div class="sidebar__logo-text">
                <h1 class="sidebar__title">FinanceHub</h1>
                <p class="sidebar__subtitle">Gestão Inteligente</p>
            </div>
        </div>

        <!-- User -->
        <div class="sidebar__user">
            <div class="user__avatar">J</div>

            <div class="user__info">
                <p class="user__name">João Silva</p>
                <p class="user__email">joao@exemplo.com</p>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar__nav">
            <p class="nav__title">Menu</p>

            <div class="nav__item">
                <span class="material-icons">dashboard</span>
                dashboard
            </div>

            <div class="nav__item">
                <span class="material-icons">wallet</span>
                Transações
            </div>

            <div class="nav__item">
                <span class="material-icons">account_balance</span>
                Contas
            </div>

            <div class="nav__item">
                <span class="material-icons">add_task</span>
                <span>Metas</span>
            </div>

            <div class="nav__item">
                <span class="material-icons">bar_chart</span>
                <span>Relatórios</span>
            </div>

            <div class="nav__item">
                <span class="material-icons">settings</span>
                <span>Configurações</span>
            </div>
        </nav>

        <!-- Logout -->
        <div class="sidebar__footer">
            <button class="logout__button">
                <span class="material-icons">exit_to_app</span>
                Sair da conta
            </button>
        </div>

    </aside>
</body>
</html>
